<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keuangan Punguan Si Raja Sonang</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2e52;
  --gold: #c8973a;
  --green: #1a7a4b;
  --green-bg: #e8f7ef;
  --red: #c0392b;
  --red-bg: #fdf0ef;
  --amber: #b7791f;
  --amber-bg: #fffbe6;
  --gray: #6b7280;
  --gray-bg: #f3f4f6;
  --border: #e5e7eb;
  --white: #ffffff;
  --bg: #f5f6fa;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size: 16px; }
body {
  background: var(--bg);
  color: #1f2937;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  background: var(--navy);
  padding: 28px 18px 24px;
  text-align: center;
}
.header-title {
  font-size: 1.45rem;
  font-weight: 900;
  color: #fff;
  line-height: 1.2;
  margin-bottom: 4px;
}
.header-title span { color: #fce49a; }
.header-sub { font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-bottom: 20px; }

.saldo-card {
  background: rgba(255,255,255,0.10);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  padding: 18px 20px;
  display: inline-block;
  width: 100%;
  max-width: 340px;
}
.saldo-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); font-weight: 700; margin-bottom: 6px; }
.saldo-amount { font-size: 2rem; font-weight: 900; color: #fce49a; letter-spacing: -0.01em; }
.saldo-note { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 4px; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 1.5px solid var(--border);
  display: flex;
  z-index: 200;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
  padding-bottom: env(safe-area-inset-bottom);
}
.bnav-btn {
  flex: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 4px 8px;
  background: none; border: none;
  font-family: 'Nunito', sans-serif;
  font-size: 0.68rem; font-weight: 700;
  color: var(--gray);
  cursor: pointer;
  transition: color 0.15s;
  gap: 3px;
}
.bnav-btn .icon { font-size: 1.35rem; line-height: 1; }
.bnav-btn.active { color: var(--navy); }
.bnav-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--gold);
  margin: 0 auto;
  visibility: hidden;
}
.bnav-btn.active .bnav-dot { visibility: visible; }

/* ── MAIN ── */
.main { padding: 16px 14px 90px; }
.page { display: none; }
.page.active { display: block; }

.sec-title {
  font-size: 1.1rem; font-weight: 900;
  color: var(--navy);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.sec-title::before {
  content: '';
  width: 4px; height: 20px;
  background: var(--gold);
  border-radius: 2px; flex-shrink: 0;
}

/* ── LAPORAN CARDS ── */
.lcard {
  background: white;
  border-radius: 16px;
  border: 1.5px solid var(--border);
  margin-bottom: 14px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}
.lcard-head {
  background: var(--navy);
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}

/* ANGKA NOMOR URUT (1, 2, DST) - SEKARANG PUTIH SOLID */
.lcard-num {
  font-size: 2.2rem; font-weight: 900;
  color: #ffffff !important;
  opacity: 0.8 !important;
  line-height: 1;
}

.lcard-right { text-align: right; }
.lcard-lokasi { color: #fce49a; font-weight: 800; font-size: 0.92rem; }
.lcard-tgl { color: #ffffff !important; opacity: 1 !important; font-size: 0.75rem; font-weight: 700; }

.lcard-body { padding: 0; }
.lcard-section { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.lcard-section:last-child { border-bottom: none; }
.lcard-section-title {
  font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--gray); margin-bottom: 8px;
}
.lrow {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 5px 0; font-size: 0.88rem; border-bottom: 1px dashed #f0ede6;
}
.lrow .desc { color: #444; flex: 1; padding-right: 10px; }
.lrow .amt { font-weight: 800; white-space: nowrap; }
.lrow .amt.in { color: var(--green); }
.lrow .amt.out { color: var(--red); }

.total-lrow {
  display: flex; justify-content: space-between;
  padding: 8px 0 0; font-weight: 800; font-size: 0.9rem;
  border-top: 2px solid var(--border); margin-top: 4px;
}

.saldo-strip {
  background: var(--navy);
  padding: 13px 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.saldo-strip .lbl { font-size: 0.72rem; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.08em; }
.saldo-strip .amt { font-size: 1.15rem; font-weight: 900; color: #ffffff !important; }

/* ── TABLE STYLES ── */
.tbl-wrap {
  background: white; border-radius: 16px; border: 1.5px solid var(--border);
  overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 14px;
}
.tbl-top { background: var(--navy); padding: 13px 16px; }
.tbl-top .tit { color: white; font-weight: 800; font-size: 0.95rem; }
.tbl-top .sub { color: rgba(255,255,255,0.7); font-size: 0.75rem; }
.tbl-scroll { overflow-x: auto; }

table { border-collapse: collapse; font-size: 0.78rem; white-space: nowrap; width: 100%; }
th {
  background: var(--navy); padding: 12px 10px; text-align: center; color: #fce49a;
  font-weight: 800; font-size: 0.75rem; text-transform: uppercase;
  border-bottom: 2px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 1;
}

/* TANGGAL DI HEADER TABEL - SEKARANG PUTIH SOLID */
th span { 
  color: #ffffff !important; 
  opacity: 1 !important; 
  display: block; 
  font-size: 0.6rem; 
  font-weight: 600; 
  margin-top: 4px;
}

th.sticky-col, td.sticky-col { position: sticky; left: 0; z-index: 2; }
th.sticky-col { background: var(--navy); color: #fce49a; }
td.sticky-col { background: white; font-weight: 700; border-right: 1.5px solid var(--border); }
td { padding: 12px 10px; border-bottom: 1px solid #f0f0f0; text-align: center; }

.badge { border-radius: 20px; font-size: 0.72rem; font-weight: 800; padding: 3px 9px; display: inline-block; }
.b-lunas { background: var(--green-bg); color: var(--green); border: 1px solid #7ecba1; }
.b-dapat { background: var(--amber-bg); color: var(--gold); border: 1px solid #f6d473; }
.b-belum { background: var(--red-bg); color: var(--red); border: 1px solid #e8a49e; }
.b-libur { background: var(--gray-bg); color: var(--gray); border: 1px solid #d1d5db; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">Punguan <span>Si Raja Sonang</span></div>
  <div class="header-sub">Laporan Keuangan · Jul 2024 – Mar 2026</div>
  <div class="saldo-card">
    <div class="saldo-label">💰 Saldo Kas Sekarang</div>
    <div class="saldo-amount">Rp 2.451.000</div>
    <div class="saldo-note">Per Maret 2026 · Pertemuan ke-16</div>
  </div>
</div>

<div class="bottom-nav">
  <button class="bnav-btn active" onclick="gotoPage(this,'laporan')">
    <div class="icon">📋</div><div>Laporan</div>
  </button>
  <button class="bnav-btn" onclick="gotoPage(this,'arisan')">
    <div class="icon">🏆</div><div>Arisan</div>
  </button>
  <button class="bnav-btn" onclick="gotoPage(this,'iuran')">

</div>

<div class="main">
  <div id="page-laporan" class="page active">
    <div class="sec-title">Laporan per Pertemuan</div>
    <div id="laporanList"></div>
  </div>

  <div id="page-arisan" class="page">
    <div class="sec-title">Daftar Arisan</div>
    <div class="tbl-wrap">
      <div class="tbl-top">
        <div class="tit">Arisan Rp 100.000 / Orang</div>
        <div class="sub">Geser ke kanan →</div>
      </div>
      <div class="tbl-scroll"><table id="tbl-arisan"></table></div>
    </div>
  </div>

  <div id="page-iuran" class="page">
    <div class="sec-title">Daftar Iuran KK</div>
    <div class="tbl-wrap">
      <div class="tbl-top">
        <div class="tit">Iuran Rp 30.000 / KK</div>
        <div class="sub">Geser ke kanan →</div>
      </div>
      <div class="tbl-scroll"><table id="tbl-iuran"></table></div>
    </div>
  </div>
</div>

<script>
// ── DATA LENGKAP TANPA POTONGAN ──

  {no:4, tgl:"01 Februari 2025", lok:"Olivia Pardosi / Br. Sitinjak", sb:3598000, pb:87000, iu:450000, tm:4135000, klr:[{tgl:"25 Feb 2025",ket:"Kunjungan Kasih Kel. Kezia Nababan",j:200000},{tgl:"27 Feb 2025",ket:"Kunjungan Kasih Kel. Cello",j:200000}], tk:400000, sa:3735000},
  {no:5, tgl:"01 Maret 2025", lok:"Zofran Pakpahan", sb:3735000, pb:59000, iu:450000, tm:4244000, klr:[{tgl:"15 Feb 2025",ket:"Kunjungan Kasih Kel. Randa",j:200000},{tgl:"01 Mar 2025",ket:"Kunjungan Kasih Kel. Zofran",j:200000}], tk:400000, sa:3844000},
  {no:6, tgl:"05 April 2025", lok:"Randa Sinaga", sb:3844000, pb:80000, iu:450000, tm:4374000, klr:[{tgl:"15 Feb 2025",ket:"Kunjungan Kasih Kel. Kristella",j:200000}], tk:200000, sa:4174000},
  {no:7, tgl:"03 Mei 2025", lok:"Vincent Pakpahan", sb:4174000, pb:70000, iu:450000, tm:4694000, klr:[{tgl:"03 Mei 2025",ket:"Amplop 100 pcs",j:24000}], tk:24000, sa:4670000},
  {no:8, tgl:"08 Juni 2025", lok:"Tonggi Gultom", sb:4670000, pb:72000, iu:450000, tm:5192000, klr:[{tgl:"",ket:"Mamoholi Dira Samosir",j:150000}], tk:150000, sa:5042000},
  {no:9, tgl:"06 Juli 2025", lok:"Kezia Nababan", sb:5042000, pb:57000, iu:450000, tm:5549000, klr:[{tgl:"",ket:"Anak Berprestasi: Tonggi (Peringkat 1)",j:200000},{tgl:"",ket:"Anak Berprestasi: Samuel (Peringkat 1)",j:200000},{tgl:"",ket:"Anak Berprestasi: Vincent (Peringkat 2)",j:150000},{tgl:"",ket:"Anak Berprestasi: Sharena (Peringkat 2)",j:150000}], tk:700000, sa:4849000},
  {no:10,tgl:"05 Agustus 2025", lok:"Santa Nainggolan", sb:4849000, pb:57000, iu:450000, tm:5356000, klr:[{tgl:"",ket:"Kunjungan Kasih Kel. Kezia Nababan",j:200000}], tk:200000, sa:4649000},
  {no:11,tgl:"06 September 2025", lok:"Kareen Pakpahan", sb:4649000, pb:51000, iu:450000, tm:5150000, klr:[{tgl:"",ket:"Kunjungan Kasih: Olivia Pakpahan",j:200000},{tgl:"",ket:"Kunjungan Kasih: Zofran Pakpahan",j:200000},{tgl:"",ket:"Kunjungan Kasih: Kristella Pakpahan",j:200000},{tgl:"",ket:"Kunjungan Kasih: Cello Manurung",j:200000},{tgl:"",ket:"Kunjungan Kasih: Amira + Falan Sinaga",j:400000}], tk:1200000, sa:3950000},
  {no:12,tgl:"04 Oktober 2025", lok:"Lamria br. Pakpahan", sb:3950000, pb:60000, iu:450000, tm:4460000, klr:[{tgl:"13 Sep 2025",ket:"Mamoholi Kel. Olivia Pardosi",j:150000}], tk:150000, sa:4310000},
  {no:13,tgl:"25 November 2025", lok:"Mikhael Pakpahan", sb:4310000, pb:0, iu:450000, tm:4760000, klr:[{tgl:"13 Sep 2025",ket:"Borhat-Borhat Keluarga Randa",j:1000000}], tk:1000000, sa:3760000},
  {no:14,tgl:"Januari 2026", lok:"TIDAK ARISAN", sb:3760000, pb:0, iu:450000, tm:4210000, klr:[{tgl:"07 Feb 2026",ket:"Kunjungan Kasih Kel. Cello Manurung",j:200000},{tgl:"02 Feb 2026",ket:"Borhat-Borhat Orang Tua Meninggal (Lamria)",j:1000000},{tgl:"02 Feb 2026",ket:"Namosok Kel. Lamria",j:350000},{tgl:"15 Feb 2026",ket:"Kunjungan Sipaet-Paet Kel. Randa",j:350000},{tgl:"",ket:"Kunjungan Mangupai Kel. Vincent (Namosok)",j:300000},{tgl:"",ket:"Tambahan Amplop",j:80000}], tk:2280000, sa:1930000},
  {no:15,tgl:"07 Maret 2026", lok:"Kristella Pakpahan", sb:1930000, pb:71000, iu:450000, tm:2451000, klr:[], tk:0, sa:2451000},
];

const anggotaArisan = [
  {nama:"Julius Sitinjak", winAt:1, raw:},
  {nama:"Kareen Pakpahan", winAt:10, raw:},
  {nama:"Dira Samosir / Br. Tamba", winAt:2, raw:},
  {nama:"Kezia Nababan", winAt:8, raw:},
  {nama:"Kristella Pakpahan", winAt:15, raw:},
  {nama:"Lamria br. Pakpahan", winAt:11, raw:},
  {nama:"Marcello Manurung", winAt:14, raw:},
  {nama:"Mikhael Pakpahan", winAt:12, raw:},
  {nama:"Olivia Pardosi / Br. Sitinjak", winAt:3, raw:},
  {nama:"Randa Sinaga", winAt:5, raw:},
  {nama:"Ruth Tanjung", winAt:0, raw:},
  {nama:"Santa Nainggolan", winAt:9, raw:},
  {nama:"Tonggi Gultom", winAt:7, raw:},
  {nama:"Vincent Pakpahan", winAt:6, raw:},
  {nama:"Zofran Pakpahan", winAt:4, raw:},
];

const anggotaIuran = [
  {nama:"Julius Sitinjak", d:},
  {nama:"Kareen Pakpahan", d:},
  {nama:"Dira Samosir / Br. Tamba", d:},
  {nama:"Kezia Nababan", d:},
  {nama:"Kristella Pakpahan", d:},
  {nama:"Lamria br. Pakpahan", d:},
  {nama:"Marcello Manurung", d:},
  {nama:"Mikhael Pakpahan", d:},
  {nama:"Olivia Pardosi / Br. Sitinjak", d:},
  {nama:"Randa Sinaga", d:},
  {nama:"Ruth Tanjung", d:},
  {nama:"Santa Nainggolan", d:},
  {nama:"Tonggi Gultom", d:},
  {nama:"Vincent Pakpahan", d:},
  {nama:"Zofran Pakpahan", d:},
];

function rp(n) { return 'Rp\u00a0' + Number(n).toLocaleString('id-ID'); }
function arisanStatus(a, i) { if (i === 13) return 'LIBUR'; if (i === a.winAt) return 'DAPAT'; return a.raw[i] === 1 ? 'LUNAS' : 'BELUM'; }
function badge(s) {
  if (s==='LUNAS') return `<span class="badge b-lunas">✓</span>`;
  if (s==='DAPAT') return `<span class="badge b-dapat">🏆</span>`;
  if (s==='BELUM') return `<span class="badge b-belum">✗</span>`;
  return `<span class="badge b-libur">—</span>`;
}

function renderLaporan() {
  const el = document.getElementById('laporanList');
  laporan.forEach(l => {
    const isTA = l.lok === 'TIDAK ARISAN';
    const keluarRows = l.klr.length ? l.klr.map(k=>`<div class="lrow"><span class="desc">${k.ket}</span><span class="amt out">${rp(k.j)}</span></div>`).join('') : `<div class="lrow"><span class="desc" style="color:var(--gray)">Tidak ada pengeluaran</span></div>`;
    el.innerHTML += `
    <div class="lcard">
      <div class="lcard-head"><div class="lcard-num">${l.no}</div><div class="lcard-right"><div class="lcard-lokasi">${isTA ? 'Tidak Ada Arisan' : l.lok}</div><div class="lcard-tgl">📅 ${l.tgl}</div></div></div>
      <div class="lcard-body">
        <div class="lcard-section"><div class="lcard-section-title">Pemasukan</div><div class="lrow"><span class="desc">Saldo sebelumnya</span><span class="amt in">${rp(l.sb)}</span></div><div class="lrow"><span class="desc">Persembahan</span><span class="amt in">${rp(l.pb)}</span></div><div class="lrow"><span class="desc">Iuran (15 KK × Rp 30.000)</span><span class="amt in">${rp(l.iu)}</span></div><div class="total-lrow"><span>Total Masuk</span><span class="amt in">${rp(l.tm)}</span></div></div>
        <div class="lcard-section"><div class="lcard-section-title">Pengeluaran</div>${keluarRows}<div class="total-lrow"><span>Total Keluar</span><span class="amt out">${rp(l.tk)}</span></div></div>
        <div class="saldo-strip"><div class="lbl">Sisa Saldo</div><div class="amt">${rp(l.sa)}</div></div>
      </div>
    </div>`;
  });
}

function renderArisan() {
  const t = document.getElementById('tbl-arisan');
  let h = '<thead><tr><th class="sticky-col" style="text-align:left;min-width:140px">Nama</th>';
  sessions.forEach(s => { h += `<th>${s.lok.split(' ')}<br><span>${s.tgl.replace('\n',' ')}</span></th>`; });
  h += '</tr></thead><tbody>';
  anggotaArisan.forEach(a => {
    let cells = '';
    sessions.forEach((s, i) => { cells += `<td>${badge(arisanStatus(a, i))}</td>`; });
    h += `<tr><td class="sticky-col">${a.nama}</td>${cells}</tr>`;
  });
  t.innerHTML = h;
}

function renderIuran() {
  const t = document.getElementById('tbl-iuran');
  let h = '<thead><tr><th class="sticky-col" style="text-align:left;min-width:140px">Nama</th>';
  sessions.forEach(s => { h += `<th>${s.lok.split(' ')}<br><span>${s.tgl.replace('\n',' ')}</span></th>`; });
  h += '</tr></thead><tbody>';
  anggotaIuran.forEach(a => {
    let cells = '';
    a.d.forEach(v => { cells += `<td>${badge(v===1?'LUNAS':'BELUM')}</td>`; });
    h += `<tr><td class="sticky-col">${a.nama}</td>${cells}</tr>`;
  });
  t.innerHTML = h;
}

function gotoPage(btn, name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  window.scrollTo({top:0});
}

renderLaporan();
renderArisan();
renderIuran();
</script>
</body>
</html>
